<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>AR Holo Card</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='80' font-size='80'>🏙️</text></svg>">
<style>
  html, body { margin: 0; height: 100%; background: #0b132b; font-family: Helvetica, Arial, sans-serif; overflow: hidden; }
  #ar { width: 100%; height: 100%; position: absolute; inset: 0; isolation: isolate; background: #000; }
  #ar video { z-index: 0 !important; }
  #ar canvas { z-index: 1 !important; }
  #overlay { position: absolute; inset: 0; z-index: 10; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 18px; background: #0b132b; color: #fff; text-align: center; padding: 24px; }
  #overlay h1 { margin: 0; font-size: 30px; } #overlay h1 span { color: #4ecdc4; }
  #overlay p { color: #90e0ef; max-width: 300px; line-height: 1.6; margin: 0; }
  #startBtn { background: #4ecdc4; color: #0b132b; border: 0; font-size: 20px; font-weight: 700;
    padding: 16px 44px; border-radius: 999px; }
  #hint { position: absolute; bottom: 28px; left: 0; right: 0; z-index: 5; text-align: center;
    color: #fff; font-size: 15px; text-shadow: 0 1px 4px #000; pointer-events: none; }
  #cardLink { color: #ffd166; font-size: 14px; }
</style>
</head>
<body>
<div id="ar"></div>
<div id="hint" hidden>Point your camera at the card &middot; flip it for the room layout <span style="opacity:.55">&middot; v6</span></div>
<div id="overlay">
  <h1>AR HOLO<span>CARD</span></h1>
  <p>Tap start, allow the camera, then point your phone at the card. The building rises out of it. Flip the card to see the 3D room layout.</p>
  <button id="startBtn">Start AR</button>
  <a id="cardLink" href="card.html">No card with you? Show the card on this screen</a>
</div>

<script type="importmap">
{ "imports": { "three": "./libs/three.module.min.js", "three/addons/": "./libs/addons/" } }
</script>
<script type="module">
import * as THREE from 'three';
import { MindARThree } from './libs/mindar-image-three.prod.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

const COLORS = { teal: 0x4ecdc4, red: 0xff6b6b, yellow: 0xffd166, purple: 0xa78bfa, orange: 0xf4a261, sky: 0x90e0ef, dark: 0x0b132b, navy: 0x3d5a80, cream: 0xfdf6ec };

// Avenue Residences towers — real 3D scan (GLB) loaded async into this group
function buildCity() {
  const holder = new THREE.Group();
  new GLTFLoader().load('./building.glb', gltf => {
    const model = gltf.scene;
    const box = new THREE.Box3().setFromObject(model);
    const size = box.getSize(new THREE.Vector3());
    const scale = 1.0 / Math.max(size.x, size.z);   // fit footprint to card width
    model.scale.setScalar(scale);
    box.setFromObject(model);
    const center = box.getCenter(new THREE.Vector3());
    model.position.set(-center.x, -box.min.y, -center.z);  // sit on the card, centered
    holder.add(model);
  });
  return holder;
}

function wallSeg(x1, z1, x2, z2, h, mat) {
  const len = Math.hypot(x2 - x1, z2 - z1);
  const m = new THREE.Mesh(new THREE.BoxGeometry(len, h, 0.025), mat);
  m.position.set((x1 + x2) / 2, h / 2, (z1 + z2) / 2);
  m.rotation.y = -Math.atan2(z2 - z1, x2 - x1);
  return m;
}

function furn(x, z, w, d, h, color) {
  const m = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), new THREE.MeshLambertMaterial({ color }));
  m.position.set(x, h / 2 + 0.015, z);
  return m;
}

function makeLabel(text) {
  const c = document.createElement('canvas');
  c.width = 256; c.height = 64;
  const g = c.getContext('2d');
  g.fillStyle = '#083d77'; g.font = 'bold 34px Helvetica';
  g.textAlign = 'center'; g.textBaseline = 'middle';
  g.fillText(text, 128, 32);
  const m = new THREE.Mesh(
    new THREE.PlaneGeometry(0.16, 0.04),
    new THREE.MeshBasicMaterial({ map: new THREE.CanvasTexture(c), transparent: true }));
  m.rotation.x = -Math.PI / 2;
  return m;
}

function buildRoom() {
  // Avenue Residences Type H (1001 sq ft): 3 bedrooms, 3 baths, balcony,
  // living/dining, kitchen + yard. Coordinates in metres from the real
  // floor plan (11.15m x 9.325m), scaled onto the card.
  const S = 0.09, CX = 5.575, CZ = 4.6625;
  const room = new THREE.Group();
  const floor = new THREE.Mesh(new THREE.BoxGeometry(11.15 * S + 0.04, 0.02, 9.325 * S + 0.04),
    new THREE.MeshLambertMaterial({ color: COLORS.cream }));
  floor.position.y = 0.01;
  room.add(floor);
  const wallMat = new THREE.MeshLambertMaterial({ color: 0x083d77, transparent: true, opacity: 0.88 });
  const H = 0.14;
  const walls = [
    [0, 0, 11.15, 0], [0, 0, 0, 6.91], [11.15, 0, 11.15, 6.91],           // top, left, right
    [0, 6.91, 1.9, 6.91], [1.9, 6.91, 1.9, 9.325],                        // yard step
    [1.9, 9.325, 10.2, 9.325], [10.2, 9.325, 10.2, 6.91], [10.2, 6.91, 11.15, 6.91], // bottom
    [4.53, 0, 4.53, 4.14], [0, 4.14, 4.53, 4.14],                         // bed2 | living, bed2/bed3
    [2.96, 0.5, 2.96, 2.94], [2.96, 2.94, 4.53, 2.94],                    // bath 2
    [2.61, 5.18, 2.61, 6.91], [2.61, 5.18, 4.53, 5.18],                   // bath 3
    [7.84, 0, 7.84, 6.91],                                                 // bed1 | living
    [8.89, 4.32, 11.15, 4.32], [8.89, 4.32, 8.89, 6.56], [8.89, 6.56, 11.15, 6.56], // bath 1
    [0, 6.91, 6.62, 6.91], [7.84, 6.91, 11.15, 6.91],                     // kitchen wall (gap = entrance)
    [3.31, 6.91, 3.31, 9.325],                                             // yard | kitchen
    [6.62, 6.91, 6.62, 9.325],                                             // kitchen | entrance
    [4.53, 1.04, 7.84, 1.04],                                              // balcony line
  ];
  for (const [x1, z1, x2, z2] of walls)
    room.add(wallSeg((x1 - CX) * S, (z1 - CZ) * S, (x2 - CX) * S, (z2 - CZ) * S, H, wallMat));
  const items = [ // x, z, w(m), d(m), h, color
    [9.3, 2.2, 2.2, 1.7, 0.05, COLORS.navy],    // bed 1
    [1.7, 1.9, 1.9, 1.5, 0.05, COLORS.navy],    // bed 2
    [1.2, 5.9, 1.7, 1.4, 0.05, COLORS.navy],    // bed 3
    [5.4, 2.0, 1.9, 0.9, 0.05, COLORS.teal],    // sofa in living
    [6.1, 5.1, 1.3, 1.3, 0.05, COLORS.orange],  // dining table
    [5.0, 8.9, 2.6, 0.6, 0.07, COLORS.red],     // kitchen counter
    [2.6, 8.6, 0.9, 0.9, 0.07, COLORS.sky],     // yard washer
    [3.7, 1.0, 0.7, 0.7, 0.04, COLORS.sky],     // bath 2 fixture
    [3.4, 6.2, 0.7, 0.7, 0.04, COLORS.sky],     // bath 3 fixture
    [10.0, 5.5, 0.7, 0.7, 0.04, COLORS.sky],    // bath 1 fixture
  ];
  for (const [x, z, w, d, h, c] of items)
    room.add(furn((x - CX) * S, (z - CZ) * S, w * S, d * S, h, c));
  const labels = [
    ['LIVING', 6.2, 3.2], ['DINING', 6.2, 5.9], ['KITCHEN', 5.0, 7.9],
    ['BED 1', 9.4, 1.2], ['BED 2', 1.7, 0.9], ['BED 3', 1.2, 4.9],
    ['BALCONY', 6.2, 0.5], ['YARD', 2.6, 7.6], ['ENTR', 7.2, 8.2],
  ];
  for (const [t, x, z] of labels) {
    const l = makeLabel(t);
    l.position.set((x - CX) * S, 0.025, (z - CZ) * S);
    room.add(l);
  }
  return room;
}

const mindar = new MindARThree({
  container: document.querySelector('#ar'),
  imageTargetSrc: './targets.mind',
  uiScanning: 'yes', uiLoading: 'yes',
  filterMinCF: 0.001, filterBeta: 1000,   // light smoothing: calms jitter, follows movement in real time
  missTolerance: 10, warmupTolerance: 2,
});
const { renderer, scene, camera } = mindar;
scene.add(new THREE.AmbientLight(0xffffff, 1.1));
const dir = new THREE.DirectionalLight(0xffffff, 1.6);
dir.position.set(0.5, 1, 1);
scene.add(dir);

const city = buildCity(), roomLayout = buildRoom();
// card plane is XY in MindAR; rotate content so its "up" (Y) points out of the card (Z)
city.rotation.x = Math.PI / 2;
roomLayout.rotation.x = Math.PI / 2;

const anchorFront = mindar.addAnchor(0);
anchorFront.group.add(city);
const anchorBack = mindar.addAnchor(1);
anchorBack.group.add(roomLayout);

// rise animation state
let cityScale = 0, roomScale = 0;
anchorFront.onTargetFound = () => { cityScale = 0.01; };
anchorBack.onTargetFound = () => { roomScale = 0.01; };

const clock = new THREE.Clock();
document.querySelector('#startBtn').addEventListener('click', async () => {
  document.querySelector('#overlay').style.display = 'none';
  document.querySelector('#hint').hidden = false;
  await mindar.start();
  renderer.setAnimationLoop(() => {
    const dt = clock.getDelta();
    if (anchorFront.group.visible && cityScale < 1) cityScale = Math.min(1, cityScale + dt * 1.5);
    if (anchorBack.group.visible && roomScale < 1) roomScale = Math.min(1, roomScale + dt * 1.5);
    city.scale.set(cityScale, cityScale, cityScale);
    roomLayout.scale.set(roomScale, roomScale, roomScale);
    renderer.render(scene, camera);
  });
});
</script>
</body>
</html>
